schema: "paperclip/v1"
agents:
  ceo:
    role: "ceo"
    adapter:
      config:
        graceSec: 20
        model: "openrouter/arcee-ai/trinity-large-preview:free"
      type: "opencode_local"
    runtime:
      heartbeat:
        enabled: true
        maxConcurrentRuns: 1
    permissions:
      canCreateAgents: true
  engineer1:
    role: "engineer"
    icon: "code"
    capabilities: "Implements technical features, writes code, fixes bugs, and supports engineering delivery. Specializes in frontend/backend development, API integrations, and system implementation. CI/CD deployment. Push new feature, fix"
    adapter:
      config:
        graceSec: 20
        model: "opencode/nemotron-3-super-free"
      type: "opencode_local"
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 600
  legalcounsel:
    role: "general"
    icon: "shield"
    capabilities: "Provides legal guidance, contract review, compliance, and risk management"
    adapter:
      config:
        graceSec: 20
        model: "openrouter/meta-llama/llama-3.3-70b-instruct:free"
      type: "opencode_local"
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 600
        maxConcurrentRuns: 1
  marketer:
    role: "general"
    icon: "search"
    capabilities: "Responsible for marketing tasks of the company"
    adapter:
      config:
        graceSec: 20
        model: "opencode/nemotron-3-super-free"
      type: "opencode_local"
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 600
  qa:
    role: "qa"
    icon: "eye"
    capabilities: "Executes comprehensive testing, quality verification, bug detection, and validation of technical implementations. Ensures software quality, reliability, and user experience standards. Test new feature, fix"
    adapter:
      config:
        graceSec: 20
        model: "opencode/minimax-m2.5-free"
      type: "opencode_local"
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 600
  reviewer:
    role: "general"
    adapter:
      config:
        dangerouslySkipPermissions: true
        graceSec: 20
        model: "openrouter/nousresearch/hermes-3-llama-3.1-405b:free"
      type: "opencode_local"
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 600
        maxConcurrentRuns: 1
  uiuxdesigner:
    role: "designer"
    icon: "eye"
    capabilities: "Owns user experience, design systems, and user research"
    adapter:
      config:
        graceSec: 20
        model: "openrouter/nvidia/nemotron-nano-9b-v2:free"
      type: "opencode_local"
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 600
        maxConcurrentRuns: 1
company:
  logoPath: "images/company-logo.png"
  requireBoardApprovalForNewAgents: false
projects:
  anrostech-company:
    color: "#eab308"
    status: "in_progress"
    workspaces:
      anrostech:
        name: "anrostech"
        defaultRef: "main"
        isPrimary: true
        repoRef: "main"
        repoUrl: "https://github.com/anrostech/anrostech"
        sourceType: "git_repo"
        visibility: "default"
  mark:
    color: "#ec4899"
    status: "in_progress"
    workspaces:
      mark:
        name: "mark"
        defaultRef: "main"
        isPrimary: true
        repoRef: "main"
        repoUrl: "https://github.com/anrostech/mark"
        sourceType: "git_repo"
        visibility: "default"
  samio-bakery:
    color: "#3b82f6"
    status: "in_progress"
    workspaces:
      samio:
        name: "samio"
        defaultRef: "main"
        isPrimary: true
        repoRef: "main"
        repoUrl: "https://github.com/anrostech/samio"
        sourceType: "git_repo"
        visibility: "default"
sidebar:
  agents:
